services:
  mysql:
    image: mysql:8.4
    container_name: onboarding-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onboarding
      MYSQL_USER: onboarding
      MYSQL_PASSWORD: onboarding
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - onboarding-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uonboarding", "-ponboarding"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: onboarding-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - onboarding-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  onboarding-mysql-data:
  onboarding-redis-data:
